; PHP production settings for TontiTOGO

; Performances
opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.revalidate_freq=0
opcache.validate_timestamps=0
opcache.fast_shutdown=1

; Limites
memory_limit=256M
max_execution_time=300
upload_max_filesize=10M
post_max_size=20M

; PostgreSQL / Supabase — timeout de connexion
pdo_pgsql.default_port=6543

; Désactiver les infos de version en production
expose_php=Off
